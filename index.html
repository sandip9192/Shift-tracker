<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Shift Log" />
  <meta name="theme-color" content="#0d1117" />
  <title>🚌 Shift Log</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: 'DM Mono', 'Courier New', monospace;
      min-height: 100vh;
      min-height: -webkit-fill-available;
    }

    /* HEADER */
    .header {
      background: linear-gradient(135deg, #1a2744 0%, #0d1117 100%);
      border-bottom: 2px solid #f7b731;
      padding: 20px 20px 14px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-top {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }
    .header-icon { font-size: 28px; }
    .header-title { font-size: 18px; font-weight: 700; color: #f7b731; letter-spacing: 1px; }
    .header-sub { font-size: 11px; color: #8b949e; letter-spacing: 2px; }
    .shift-count {
      margin-left: auto;
      background: #f7b731;
      color: #0d1117;
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 13px;
      font-weight: 700;
    }
    .nav { display: flex; gap: 8px; }
    .nav-btn {
      background: transparent;
      color: #8b949e;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 7px 18px;
      font-size: 13px;
      font-family: inherit;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: all 0.2s;
    }
    .nav-btn.active {
      background: #f7b731;
      color: #0d1117;
      border-color: #f7b731;
    }

    /* MAIN */
    .main { padding: 20px 16px; max-width: 600px; margin: 0 auto; }

    /* FORM */
    .form-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 14px;
      padding: 20px;
    }
    .form-title {
      font-size: 15px;
      font-weight: 700;
      color: #f7b731;
      margin-bottom: 18px;
      letter-spacing: 1px;
    }
    .field { margin-bottom: 14px; }
    .field label {
      font-size: 11px;
      color: #8b949e;
      letter-spacing: 2px;
      display: block;
      margin-bottom: 5px;
      text-transform: uppercase;
    }
    .field input, .field select {
      width: 100%;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 10px 12px;
      color: #e6edf3;
      font-family: inherit;
      font-size: 15px;
      outline: none;
      color-scheme: dark;
      -webkit-appearance: none;
      appearance: none;
    }
    .field input:focus { border-color: #f7b731; }
    .day-display {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 15px;
      color: #484f58;
    }
    .day-display.filled { color: #f7b731; }
    .hod-decimal {
      display: none;
      margin-top: 6px;
      background: #1a2030;
      border: 1px solid #3a6bc4;
      border-radius: 7px;
      padding: 7px 12px;
      font-size: 13px;
      color: #79b8ff;
      align-items: center;
      gap: 8px;
    }
    .hod-decimal.show { display: flex; }
    .duration-box {
      display: none;
      background: #1c2a1c;
      border: 1px solid #3fb950;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 16px;
      font-size: 14px;
      color: #3fb950;
    }
    .duration-box.show { display: block; }
    .save-btn {
      width: 100%;
      background: #f7b731;
      color: #0d1117;
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.3s;
    }
    .save-btn.saved { background: #3fb950; }

    /* SEARCH */
    .search-input {
      width: 100%;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 11px 14px;
      color: #e6edf3;
      font-family: inherit;
      font-size: 14px;
      outline: none;
      margin-bottom: 16px;
      color-scheme: dark;
    }

    /* EMPTY STATE */
    .empty {
      text-align: center;
      color: #484f58;
      margin-top: 60px;
      font-size: 15px;
    }
    .empty .emoji { font-size: 40px; margin-bottom: 12px; }

    /* SHIFT CARD */
    .shift-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      position: relative;
    }
    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .date-badge {
      background: #f7b731;
      color: #0d1117;
      border-radius: 8px;
      padding: 4px 12px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1px;
    }
    .day-label { color: #8b949e; font-size: 13px; }
    .duration-label { margin-left: auto; color: #3fb950; font-size: 13px; }
    .card-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px 8px;
    }
    .card-field-label {
      font-size: 10px;
      color: #484f58;
      letter-spacing: 2px;
      margin-bottom: 2px;
      text-transform: uppercase;
    }
    .card-field-value { font-size: 14px; font-weight: 600; color: #e6edf3; }
    .delete-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      background: transparent;
      border: none;
      color: #484f58;
      font-size: 18px;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
    }
    .delete-btn:hover { color: #ff7b72; }

    /* HIDDEN */
    .hidden { display: none; }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <span class="header-icon">🚌</span>
    <div>
      <div class="header-title">SHIFT LOG</div>
      <div class="header-sub">BUS DRIVER WORK RECORD</div>
    </div>
    <div class="shift-count" id="shiftCount">0 shifts</div>
  </div>
  <div class="nav">
    <button class="nav-btn" id="navLog" onclick="showView('log')">📋 View Log</button>
    <button class="nav-btn active" id="navAdd" onclick="showView('add')">➕ Add Shift</button>
  </div>
</div>

<div class="main">

  <!-- ADD FORM -->
  <div id="viewAdd">
    <div class="form-card">
      <div class="form-title">NEW SHIFT ENTRY</div>

      <div class="field">
        <label>Date</label>
        <input type="date" id="fDate" oninput="onDateChange()" />
      </div>
      <div class="field">
        <label>Day (auto-filled)</label>
        <div class="day-display" id="dayDisplay">Pick a date above</div>
      </div>
      <div class="field">
        <label>Bus No.</label>
        <input type="text" id="fBusNo" placeholder="e.g. 813" />
      </div>
      <div class="field">
        <label>Shift</label>
        <input type="text" id="fShift" placeholder="e.g. 6524" />
      </div>
      <div class="field">
        <label>Start Time</label>
        <input type="time" id="fStart" oninput="updateDuration()" />
      </div>
      <div class="field">
        <label>Finish Time</label>
        <input type="time" id="fFinish" oninput="updateDuration()" />
      </div>

      <div class="duration-box" id="durationBox">
        ⏱ Duration: <strong id="durationText"></strong>
      </div>

      <div class="field">
        <label>HOD</label>
        <input type="text" id="fHod" placeholder="e.g. 7H41" oninput="onHodChange()" />
        <div class="hod-decimal" id="hodDecimal">
          <span>🔢</span>
          <span id="hodDecimalText"></span>
        </div>
      </div>

      <button class="save-btn" id="saveBtn" onclick="saveShift()">SAVE SHIFT</button>
    </div>
  </div>

  <!-- LOG VIEW -->
  <div id="viewLog" class="hidden">
    <input class="search-input" id="searchInput" placeholder="🔍  Search by date, bus, shift, day..." oninput="renderLog()" />
    <div id="shiftList"></div>
  </div>

</div>

<script>
  const STORAGE_KEY = 'bus-shift-log-v1';
  const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

  let shifts = [];
  let currentView = 'add';

  // Load from localStorage
  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      shifts = raw ? JSON.parse(raw) : [];
    } catch { shifts = []; }
    updateCount();
  }

  function persist() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(shifts));
    updateCount();
  }

  function updateCount() {
    document.getElementById('shiftCount').textContent = shifts.length + (shifts.length === 1 ? ' shift' : ' shifts');
  }

  // View switching
  function showView(v) {
    currentView = v;
    document.getElementById('viewAdd').classList.toggle('hidden', v !== 'add');
    document.getElementById('viewLog').classList.toggle('hidden', v !== 'log');
    document.getElementById('navAdd').classList.toggle('active', v === 'add');
    document.getElementById('navLog').classList.toggle('active', v === 'log');
    if (v === 'log') renderLog();
  }

  // Date -> Day
  function onDateChange() {
    const val = document.getElementById('fDate').value;
    const display = document.getElementById('dayDisplay');
    if (val) {
      // Parse as local date to avoid timezone offset issues
      const parts = val.split('-');
      const d = new Date(parts[0], parts[1]-1, parts[2]);
      display.textContent = DAYS[d.getDay()];
      display.classList.add('filled');
    } else {
      display.textContent = 'Pick a date above';
      display.classList.remove('filled');
    }
  }

  // Duration calc
  function calcDuration(start, finish) {
    if (!start || !finish) return '';
    const [sh, sm] = start.split(':').map(Number);
    const [fh, fm] = finish.split(':').map(Number);
    let mins = (fh * 60 + fm) - (sh * 60 + sm);
    if (mins < 0) mins += 24 * 60;
    const h = Math.floor(mins / 60);
    const m = mins % 60;
    return h + 'h ' + String(m).padStart(2,'0') + 'm';
  }

  function updateDuration() {
    const s = document.getElementById('fStart').value;
    const f = document.getElementById('fFinish').value;
    const box = document.getElementById('durationBox');
    const txt = document.getElementById('durationText');
    const dur = calcDuration(s, f);
    if (dur) {
      txt.textContent = dur;
      box.classList.add('show');
    } else {
      box.classList.remove('show');
    }
  }

  // HOD to decimal
  function hodToDecimal(hod) {
    if (!hod) return null;
    const match = hod.toUpperCase().match(/^(\d+)H(\d+)$/);
    if (!match) return null;
    return (parseInt(match[1]) + parseInt(match[2]) / 60).toFixed(2);
  }

  function onHodChange() {
    const val = document.getElementById('fHod').value;
    const dec = hodToDecimal(val);
    const box = document.getElementById('hodDecimal');
    const txt = document.getElementById('hodDecimalText');
    if (dec) {
      txt.innerHTML = '<strong>' + val.toUpperCase() + '</strong> = <strong>' + dec + ' hrs</strong>';
      box.classList.add('show');
    } else {
      box.classList.remove('show');
    }
  }

  // Save
  function saveShift() {
    const date = document.getElementById('fDate').value;
    const busNo = document.getElementById('fBusNo').value.trim();
    const shift = document.getElementById('fShift').value.trim();
    if (!date || !busNo || !shift) {
      alert('Please fill in at least Date, Bus No., and Shift.');
      return;
    }
    const dayEl = document.getElementById('dayDisplay');
    const day = dayEl.classList.contains('filled') ? dayEl.textContent : '';
    const entry = {
      id: Date.now(),
      date, day, busNo, shift,
      start: document.getElementById('fStart').value,
      finish: document.getElementById('fFinish').value,
      hod: document.getElementById('fHod').value.trim(),
    };
    shifts.unshift(entry);
    persist();

    // Flash saved
    const btn = document.getElementById('saveBtn');
    btn.textContent = '✓ SAVED!';
    btn.classList.add('saved');
    setTimeout(() => {
      btn.textContent = 'SAVE SHIFT';
      btn.classList.remove('saved');
      resetForm();
      showView('log');
    }, 1200);
  }

  function resetForm() {
    ['fDate','fBusNo','fShift','fStart','fFinish','fHod'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('dayDisplay').textContent = 'Pick a date above';
    document.getElementById('dayDisplay').classList.remove('filled');
    document.getElementById('durationBox').classList.remove('show');
    document.getElementById('hodDecimal').classList.remove('show');
  }

  // Delete
  function deleteShift(id) {
    shifts = shifts.filter(s => s.id !== id);
    persist();
    renderLog();
  }

  // Render log
  function renderLog() {
    const q = (document.getElementById('searchInput').value || '').toLowerCase();
    const list = document.getElementById('shiftList');
    const filtered = q
      ? shifts.filter(s =>
          (s.date||'').includes(q) ||
          (s.busNo||'').toLowerCase().includes(q) ||
          (s.shift||'').toLowerCase().includes(q) ||
          (s.day||'').toLowerCase().includes(q)
        )
      : shifts;

    if (filtered.length === 0) {
      list.innerHTML = `<div class="empty"><div class="emoji">🚌</div>${shifts.length === 0 ? 'No shifts yet. Tap <strong style="color:#f7b731">Add Shift</strong> to log your first day!' : 'No results found.'}</div>`;
      return;
    }

    list.innerHTML = filtered.map(s => {
      const dateStr = s.date
        ? new Date(s.date.split('-')[0], s.date.split('-')[1]-1, s.date.split('-')[2])
            .toLocaleDateString('en-GB', { day:'2-digit', month:'short' })
        : s.date;
      const dur = calcDuration(s.start, s.finish);
      const dec = hodToDecimal(s.hod);
      const hodDisplay = s.hod ? s.hod + (dec ? ' (' + dec + ')' : '') : '—';

      return `
        <div class="shift-card">
          <div class="card-header">
            <div class="date-badge">${dateStr || '—'}</div>
            <div class="day-label">${s.day || ''}</div>
            ${dur ? `<div class="duration-label">⏱ ${dur}</div>` : ''}
          </div>
          <div class="card-grid">
            <div><div class="card-field-label">Bus</div><div class="card-field-value">${s.busNo||'—'}</div></div>
            <div><div class="card-field-label">Shift</div><div class="card-field-value">${s.shift||'—'}</div></div>
            <div><div class="card-field-label">HOD</div><div class="card-field-value">${hodDisplay}</div></div>
            <div><div class="card-field-label">Start</div><div class="card-field-value">${s.start||'—'}</div></div>
            <div><div class="card-field-label">Finish</div><div class="card-field-value">${s.finish||'—'}</div></div>
          </div>
          <button class="delete-btn" onclick="deleteShift(${s.id})">✕</button>
        </div>`;
    }).join('');
  }

  // Init
  load();
  showView('add');
</script>
</body>
</html>
